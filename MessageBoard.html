<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>MessageBoard</title>
        <link rel="stylesheet" type="text/css" href="MessageBoard.css"/>
        <div id="header">
            <h1>Message Board(Version1.0)</h1>
        </div>
    </head>

    <body>
        <div id="right">
            <h1>MESSAGE EDITOR</h1>
			<form>
				<h2>Name</h2>
				<p>
					<input id="nameBox" type="text" name="name" value="input your name here">
				</p>
				<br />
		
				<h2>Message</h2>
				<p>
					<textarea id="messageBox" rows="10" cols="30">input your message here.</textarea>
				</p>
				<br />
				
				<input type="button" value="Submit" onclick="showMessage();">
            </form> 
        </div>

        <div id="left">
            <h1>MESSAGE BOARD</h1>
            <h2>Message</h2>
			<p id="message"></p>
            <h2>Name</h2>
			<p id="name"><p>
            <h2>Time</h2>
			<p id="time"></p>
        </div>
        <script src="MessageBoard.js"></script>
    </body>
</html>
