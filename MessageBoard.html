<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>MessageBoard</title>
        <link rel="stylesheet" type="text/css" href="MessageBoard.css"/>
        <h1 id="header">Message(Version1.2)</h1>
    </head>

    <body>
        <div id="right">
            <h1>Write</h1>
			<form>
				<h2><em>Name</em></h2>
				<br />
				<p>
					<input id="nameBox" type="text" name="name" value="input your name here">
				</p>
				<br />
		
				<h2><em>Message</em></h2>
				<br />
				<p>
					<textarea id="messageBox">input your message here</textarea>
				</p>
				<br />
				<p>
					<input id="submit" type="button" value="Submit" onclick="showMessage();">
				</p>
			</form> 
        </div>

        <div id="left">
            <h1>Read</h1>
			<br />
			<p id="message"></p>
			<br />
			<p id="name"></p>
			<br />
			<p id="time"></p>
			<br />
        </div>
        <script src="MessageBoard.js"></script>
    </body>
</html>
